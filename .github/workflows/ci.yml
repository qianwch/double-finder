name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      # The codebase is developed against a modern Swift toolchain and uses
      # Swift 6-era syntax (e.g. `: @preconcurrency Protocol` conformances,
      # `nonisolated(unsafe)`). The macos-14 image's default Xcode (15.x) is too
      # old and rejects these, so pin to the newest stable Xcode on the runner.
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show Swift version
        run: swift --version

      - name: Build (debug)
        run: swift build

      - name: Test
        run: swift test

      - name: Build (release)
        run: swift build -c release
